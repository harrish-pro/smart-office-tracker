<!DOCTYPE html>
<html>

<head>

    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-5">

        <h2>Edit Task</h2>

        <form action="/update/{{ task[0] }}"
              method="POST">

            <div class="mb-3">

                <input type="text"
                       name="title"
                       value="{{ task[2] }}"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <input type="date"
                       name="deadline"
                       value="{{ task[3] }}"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <select name="status"
                        class="form-select">

                    <option>Pending</option>

                    <option>Completed</option>

                </select>

            </div>

            <button type="submit"
                    class="btn btn-success">

                Update

            </button>

        </form>

    </div>

</div>

</body>
</html>
