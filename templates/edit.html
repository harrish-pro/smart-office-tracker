<!DOCTYPE html>
<html>

<head>

    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-5">

            <h2 class="mb-4">

                Edit Task

            </h2>

            <form action="/update/{{ task[0] }}"
                  method="POST">

                <div class="mb-3">

                    <label class="form-label">

                        Task Name

                    </label>

                    <input type="text"
                           name="title"
                           value="{{ task[1] }}"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Deadline

                    </label>

                    <input type="date"
                           name="deadline"
                           value="{{ task[2] }}"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Status

                    </label>

                    <select name="status"
                            class="form-select">

                        <option>Pending</option>

                        <option>Completed</option>

                    </select>

                </div>

                <button type="submit"
                        class="btn btn-success">

                    Update Task

                </button>

                <a href="/"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</body>
</html>
